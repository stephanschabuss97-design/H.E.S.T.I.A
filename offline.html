<!doctype html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#2b3557">
  <title>HESTIA - Offline</title>
  <style>
    :root {
      --c-bg: #2b3557;
      --c-mid: #566590;
      --c-light: #d8dced;
      --c-text: #ebe4dc;
      --c-subtle: #d1cada;
      --c-panel: rgba(21, 27, 47, 0.6);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 20px;
      color: var(--c-text);
      font-family: "Segoe UI", sans-serif;
      background: linear-gradient(165deg, var(--c-bg) 0%, var(--c-mid) 48%, var(--c-light) 100%);
    }

    .card {
      max-width: 560px;
      width: 100%;
      padding: 22px;
      border-radius: 16px;
      background: var(--c-panel);
      box-shadow: 0 10px 32px rgba(8, 11, 20, 0.35), inset 0 1px 0 rgba(255, 255, 255, 0.12);
    }

    h1 {
      margin: 0 0 8px;
      font-size: 1.7rem;
    }

    p {
      margin: 0;
      color: var(--c-subtle);
      line-height: 1.45;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Du bist gerade offline.</h1>
    <p>Die zuletzt geladenen HESTIA-Inhalte sind weiterhin verfügbar. Sobald die Verbindung zurück ist, synchronisiert sich die App wieder.</p>
  </main>
</body>
</html>
