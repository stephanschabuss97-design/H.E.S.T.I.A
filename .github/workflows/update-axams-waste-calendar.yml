name: Update Axams waste calendar

on:
  workflow_dispatch:
  schedule:
    - cron: "17 3 15,30 1 *"
    - cron: "17 3 1 4,7,10 *"

permissions:
  contents: write

concurrency:
  group: waste-calendar-${{ github.ref }}
  cancel-in-progress: false

jobs:
  update-waste-calendar:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Check updater syntax
        run: node --check scripts/update-waste-calendar.mjs

      - name: Generate waste calendar JSON
        run: node scripts/update-waste-calendar.mjs --write-json

      - name: Check JSON diff
        id: waste_diff
        shell: bash
        run: |
          if git diff --quiet -- assets/data/waste-calendar.axams.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit updated waste calendar JSON
        if: steps.waste_diff.outputs.changed == 'true'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/data/waste-calendar.axams.json
          git commit -m "chore(waste): update Axams calendar data"
          git push

      - name: Report unchanged waste calendar JSON
        if: steps.waste_diff.outputs.changed == 'false'
        run: echo "Waste calendar JSON is unchanged."
